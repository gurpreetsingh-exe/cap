<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Caption Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Serif+Display:ital@0;1&family=Inter+Tight:wght@800;900&family=Manrope:wght@500;700;800&family=Montserrat:wght@800;900&display=block" rel="stylesheet">
    <style>
      :root {
        color-scheme: dark;
        --bg: #161719;
        --panel: #202124;
        --panel-strong: #2a2b2f;
        --panel-soft: #1b1c1f;
        --line: #3a3c41;
        --line-soft: #2b2d31;
        --text: #d9dce1;
        --muted: #8f949c;
        --accent: #d59b35;
        --accent-strong: #efb24a;
        --danger: #d56a6a;
        --warning: #d2aa55;
        --caption-color: #ffffff;
        --caption-size: 34px;
        --caption-bg: rgba(0, 0, 0, 0);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font: 12px/1.35 Manrope, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      textarea,
      input,
      select {
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 2px;
        cursor: pointer;
        -webkit-user-select: none;
        user-select: none;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      body.resizing {
        user-select: none;
      }

      .app {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .title-bar {
        min-height: 38px;
        display: grid;
        grid-template-columns: minmax(180px, 1fr) auto;
        align-items: center;
        gap: 8px;
        padding: 5px 7px;
        background: #1c1d20;
        border-bottom: 1px solid #111214;
      }

      .project-name-field {
        min-width: 0;
        height: 26px;
        padding: 0 8px;
        color: var(--text);
        background: #141518;
        border: 1px solid var(--line-soft);
        border-radius: 2px;
        outline: none;
        font-weight: 750;
      }

      .project-name-field:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(213, 155, 53, 0.38);
      }

      .project-menu {
        position: relative;
      }

      .project-menu summary {
        list-style: none;
        -webkit-user-select: none;
        user-select: none;
      }

      .project-menu summary::-webkit-details-marker {
        display: none;
      }

      .project-menu[open] summary {
        border-color: var(--accent);
      }

      .project-menu-panel {
        position: absolute;
        z-index: 30;
        top: calc(100% + 6px);
        right: 0;
        width: min(320px, calc(100vw - 16px));
        display: grid;
        gap: 8px;
        padding: 8px;
        background: rgba(32, 33, 36, 0.98);
        border: 1px solid var(--line);
        border-radius: 2px;
        box-shadow: 0 16px 34px rgba(0, 0, 0, 0.42);
        -webkit-user-select: none;
        user-select: none;
      }

      .settings-icon {
        width: 15px;
        height: 15px;
        display: block;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .menu-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .editor,
      .toast-region {
        -webkit-user-select: none;
        user-select: none;
      }

      textarea,
      input[type="text"],
      input[type="number"] {
        -webkit-user-select: text;
        user-select: text;
      }

      .toolbar,
      .panel-actions,
      .preview-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 4px;
      }

      .btn {
        min-height: 24px;
        padding: 0 8px;
        background: var(--panel-strong);
        color: var(--text);
        border: 1px solid var(--line);
        font-size: 11px;
      }

      .btn:hover {
        border-color: #55575d;
        background: #33353a;
      }

      .btn.primary {
        background: var(--accent);
        color: #1b1204;
        border-color: var(--accent);
        font-weight: 750;
      }

      .btn.primary:hover {
        background: var(--accent-strong);
      }

      .icon-btn {
        width: 24px;
        height: 24px;
        min-height: 24px;
        display: inline-grid;
        place-items: center;
        padding: 0;
        flex: 0 0 auto;
      }

      .play-icon {
        width: 0;
        height: 0;
        margin-left: 2px;
        border-top: 5px solid transparent;
        border-bottom: 5px solid transparent;
        border-left: 8px solid currentColor;
      }

      .pause-icon {
        width: 10px;
        height: 11px;
        display: none;
        border-left: 3px solid currentColor;
        border-right: 3px solid currentColor;
      }

      .icon-btn.is-playing .play-icon {
        display: none;
      }

      .icon-btn.is-playing .pause-icon {
        display: block;
      }

      .editor {
        flex: 1;
        height: auto;
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(240px, var(--captions-width, 340px)) 4px minmax(360px, 1fr) 4px minmax(230px, var(--properties-width, 300px));
        grid-template-rows: minmax(0, 1fr) 4px var(--timeline-height, 178px);
        grid-template-areas:
          "captions split-left preview split-right properties"
          "split-bottom split-bottom split-bottom split-bottom split-bottom"
          "timeline timeline timeline timeline timeline";
        gap: 2px;
        padding: 3px;
        overflow: hidden;
      }

      .panel {
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        background: var(--panel);
        border: 1px solid #111214;
        border-radius: 2px;
      }

      .panel-head {
        min-height: 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        padding: 4px 7px;
        background: #26272b;
        border-bottom: 1px solid #141518;
      }

      .panel-title {
        margin: 0;
        color: #c7cbd1;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .caption-panel {
        grid-area: captions;
      }

      .preview-panel {
        grid-area: preview;
        overflow: hidden;
      }

      .properties-panel {
        grid-area: properties;
      }

      .timeline-panel {
        grid-area: timeline;
      }

      .splitter {
        position: relative;
        border-radius: 999px;
        background: transparent;
      }

      .splitter::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: rgba(255, 255, 255, 0.08);
        opacity: 0;
        transition: opacity 120ms ease, background 120ms ease;
      }

      .splitter:hover::before,
      .splitter.active::before {
        opacity: 1;
        background: rgba(213, 155, 53, 0.45);
      }

      .splitter.vertical {
        cursor: col-resize;
      }

      .splitter.horizontal {
        cursor: row-resize;
      }

      .split-left {
        grid-area: split-left;
      }

      .split-right {
        grid-area: split-right;
      }

      .split-bottom {
        grid-area: split-bottom;
      }

      .file-row {
        display: grid;
        gap: 4px;
        padding: 7px;
        color: var(--muted);
        background: var(--panel-soft);
        border-bottom: 1px solid #141518;
      }

      .file-row input {
        width: 100%;
        min-width: 0;
        color: var(--muted);
      }

      .input-wrap {
        padding: 6px;
        background: var(--panel-soft);
        border-bottom: 1px solid #141518;
      }

      textarea {
        width: 100%;
        min-height: 142px;
        max-height: 30vh;
        resize: vertical;
        display: block;
        padding: 7px;
        color: var(--text);
        background: #121316;
        border: 1px solid var(--line);
        border-radius: 2px;
        outline: none;
        tab-size: 2;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 11px;
      }

      textarea:focus,
      .select:focus,
      .field input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(213, 155, 53, 0.38);
      }

      .cue-list {
        min-height: 0;
        overflow: auto;
        padding: 0 7px 7px;
      }

      .cue-list:empty::before {
        content: "Parsed captions will appear here.";
        display: block;
        padding: 18px;
        text-align: center;
        color: var(--muted);
        background: var(--panel-soft);
        border: 1px dashed var(--line);
        border-radius: 2px;
      }

      .cue {
        display: grid;
        grid-template-columns: 30px minmax(0, 1fr);
        gap: 7px;
        padding: 7px 0;
        border-bottom: 1px solid #2a2c30;
        -webkit-user-select: none;
        user-select: none;
      }

      .cue.active .cue-index,
      .timeline-cue.active {
        border-color: var(--accent);
        background: rgba(213, 155, 53, 0.28);
      }

      .cue:first-child {
        padding-top: 0;
      }

      .cue:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }

      .cue-index {
        width: 24px;
        height: 22px;
        display: grid;
        place-items: center;
        border-radius: 2px;
        background: rgba(213, 155, 53, 0.12);
        border: 1px solid transparent;
        color: var(--accent-strong);
        font-size: 11px;
        font-weight: 700;
      }

      .cue-time {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        align-items: center;
        color: var(--muted);
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 10px;
      }

      .cue-text {
        margin-top: 4px;
        white-space: pre-wrap;
        color: var(--text);
        font-size: 11px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 18px;
        padding: 0 5px;
        border-radius: 2px;
        background: #17181b;
        border: 1px solid var(--line);
      }

      .empty-text {
        color: var(--muted);
        font-style: italic;
      }

      .preview-body {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-rows: minmax(0, 1fr) 32px;
        gap: 0;
        padding: 0;
        overflow: hidden;
      }

      .stage-area {
        height: 100%;
        min-height: 0;
        padding: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background: #141518;
        border: 1px solid #111214;
        border-radius: 2px;
      }

      .video-stage {
        position: relative;
        overflow: hidden;
        width: 100%;
        height: auto;
        flex: 0 0 auto;
        aspect-ratio: 16 / 9;
        background: #07090d;
        border: 1px solid var(--line);
        border-radius: 1px;
      }

      #previewCanvas,
      .subtitle-layer {
        width: 100%;
        height: 100%;
        display: block;
      }

      .subtitle-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .preview-controls {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        align-items: center;
        gap: 8px;
        height: 32px;
        padding: 3px 6px;
        background: #191a1e;
        border-top: 1px solid #111214;
      }

      .status-bar {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 24px;
        padding: 0 7px;
        background: #15161a;
        border-top: 1px solid #111214;
        overflow: hidden;
        flex: 0 0 auto;
      }

      .status-item {
        min-width: 0;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        color: var(--muted);
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 10px;
        white-space: nowrap;
      }

      .status-label {
        color: #676c75;
      }

      .status-item .time-label {
        min-width: auto;
        text-align: left;
      }

      .time-label {
        min-width: 104px;
        color: var(--muted);
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 10px;
        text-align: right;
      }

      .range {
        width: 100%;
        accent-color: var(--accent);
      }

      .select {
        min-height: 24px;
        padding: 0 7px;
        color: var(--text);
        background: var(--panel-strong);
        border: 1px solid var(--line);
        border-radius: 2px;
        outline: none;
        font-size: 11px;
        -webkit-user-select: none;
        user-select: none;
      }

      .properties-scroll {
        min-height: 0;
        overflow: auto;
        padding: 6px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 4px;
        margin-bottom: 6px;
      }

      .stat,
      .meta-row,
      .property-group {
        min-width: 0;
        background: var(--panel-soft);
        border: 1px solid var(--line-soft);
        border-radius: 2px;
        -webkit-user-select: none;
        user-select: none;
      }

      .stat {
        padding: 6px;
      }

      .stat-value {
        display: block;
        font-size: 15px;
        line-height: 1.1;
        font-weight: 750;
      }

      .stat-label,
      .meta-label,
      .field span {
        display: block;
        margin-top: 3px;
        color: var(--muted);
        font-size: 10px;
      }

      .meta-row {
        padding: 6px;
        margin-bottom: 4px;
      }

      .meta-value {
        display: block;
        margin-top: 3px;
        color: var(--text);
        font-weight: 750;
      }

      .property-group {
        display: grid;
        gap: 1px;
        padding: 7px;
        margin-top: 6px;
      }

      .property-title {
        margin: 0;
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
      }

      .field {
        display: grid;
        gap: 4px;
      }

      .settings-field {
        min-height: 28px;
        display: grid;
        grid-template-columns: minmax(82px, 0.72fr) minmax(0, 1fr);
        gap: 8px;
        align-items: center;
      }

      .settings-field span {
        margin-top: 0;
      }

      .settings-field .select,
      .settings-field input {
        min-width: 0;
      }

      .action-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px;
      }

      .action-grid .btn {
        width: 100%;
      }

      .field input[type="number"],
      .field input[type="color"],
      .field input[type="text"] {
        width: 100%;
        min-height: 24px;
        color: var(--text);
        background: var(--panel-strong);
        border: 1px solid var(--line);
        border-radius: 2px;
        outline: none;
      }

      .field input[type="number"] {
        padding: 0 7px;
        -webkit-user-select: text;
        user-select: text;
      }

      .field input[type="text"] {
        padding: 0 7px;
      }

      .messages {
        display: grid;
        gap: 4px;
        margin-top: 6px;
      }

      .message {
        padding: 6px 7px;
        border-radius: 2px;
        background: var(--panel-soft);
        border: 1px solid var(--line-soft);
        color: var(--muted);
      }

      .message.error {
        color: #ffd5d5;
        border-color: rgba(255, 122, 122, 0.38);
        background: rgba(255, 122, 122, 0.08);
      }

      .message.warning {
        color: #ffe5aa;
        border-color: rgba(240, 198, 107, 0.36);
        background: rgba(240, 198, 107, 0.08);
      }

      .timeline-body {
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 5px;
        padding: 6px;
      }

      .timeline-ruler {
        display: flex;
        justify-content: space-between;
        color: var(--muted);
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 10px;
      }

      .timeline-track {
        position: relative;
        overflow: hidden;
        min-height: 76px;
        cursor: ew-resize;
        touch-action: none;
        background:
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.05) 0 1px, transparent 1px 64px),
          #15161a;
        border: 1px solid var(--line);
        border-radius: 2px;
      }

      .timeline-track.scrubbing {
        border-color: rgba(213, 155, 53, 0.72);
      }

      .timeline-cue {
        position: absolute;
        top: 16px;
        min-width: 24px;
        height: 42px;
        overflow: hidden;
        padding: 5px 6px;
        color: var(--text);
        background: rgba(213, 155, 53, 0.16);
        border: 1px solid rgba(213, 155, 53, 0.42);
        border-radius: 2px;
        white-space: nowrap;
        text-overflow: ellipsis;
        font-size: 10px;
        -webkit-user-select: none;
        user-select: none;
        pointer-events: none;
      }

      .timeline-playhead {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 2px;
        background: var(--accent-strong);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.4), 0 0 12px rgba(213, 155, 53, 0.45);
        transform: translateX(-1px);
      }

      .toast-region {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 20;
        display: grid;
        gap: 6px;
        width: min(340px, calc(100vw - 36px));
        pointer-events: none;
      }

      .toast {
        padding: 8px 10px;
        border-radius: 2px;
        color: var(--text);
        background: rgba(30, 31, 34, 0.96);
        border: 1px solid rgba(213, 155, 53, 0.45);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.36);
        animation: toast-in 160ms ease-out both, toast-out 220ms ease-in 2.6s forwards;
        pointer-events: auto;
      }

      .toast.error {
        color: #ffd5d5;
        border-color: rgba(255, 122, 122, 0.48);
        background: rgba(34, 18, 21, 0.96);
      }

      @keyframes toast-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes toast-out {
        to {
          opacity: 0;
          transform: translateY(8px);
        }
      }

      @media (max-width: 1120px) {
        .editor {
          grid-template-columns: minmax(280px, 340px) minmax(420px, 1fr);
          grid-template-rows: minmax(420px, 1fr) auto 178px;
          grid-template-areas:
            "captions preview"
            "properties properties"
            "timeline timeline";
        }

        .splitter {
          display: none;
        }
      }

      @media (max-width: 760px) {
        .title-bar {
          grid-template-columns: 1fr;
        }

        .project-menu-panel {
          left: 0;
          right: auto;
        }

        .editor {
          grid-template-columns: 1fr;
          grid-template-rows: auto auto auto 178px;
          grid-template-areas:
            "preview"
            "captions"
            "properties"
            "timeline";
        }

        .preview-controls {
          grid-template-columns: 1fr;
        }

        .status-bar {
          flex-wrap: wrap;
          height: auto;
          min-height: 24px;
          padding-block: 4px;
        }

        .action-grid {
          grid-template-columns: 1fr;
        }

        .time-label {
          text-align: left;
        }

        .toast-region {
          right: 10px;
          bottom: 10px;
          width: calc(100vw - 20px);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="title-bar" id="titleBar">
        <input class="project-name-field" id="projectName" type="text" value="Caption Project" aria-label="Project name">
        <details class="project-menu" id="projectMenu">
          <summary class="btn icon-btn" aria-label="Project settings" title="Project settings">
            <svg class="settings-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </summary>
          <div class="project-menu-panel">
            <label class="field settings-field">
              <span>Resolution</span>
              <select class="select" id="resolutionSelect" aria-label="Preview resolution">
                <option value="1280x720">1280 x 720</option>
                <option value="1920x1080">1920 x 1080</option>
                <option value="1080x1080">1080 x 1080</option>
                <option value="1080x1920">1080 x 1920</option>
                <option value="custom">Custom</option>
              </select>
            </label>
            <div class="menu-grid">
              <label class="field">
                <span>Custom Width</span>
                <input id="customWidthInput" type="number" min="16" max="7680" step="2" value="1280" disabled>
              </label>
              <label class="field">
                <span>Custom Height</span>
                <input id="customHeightInput" type="number" min="16" max="4320" step="2" value="720" disabled>
              </label>
            </div>
            <label class="field">
              <span>FPS</span>
              <input id="fpsInput" type="number" min="1" max="120" step="1" value="30">
            </label>
          </div>
        </details>
      </header>
      <section class="editor">
        <aside class="panel caption-panel">
          <div class="panel-head">
            <h2 class="panel-title">Captions</h2>
            <button class="btn" id="clearBtn" type="button">Clear</button>
          </div>
          <label class="file-row">
            <span>Source SRT</span>
            <input id="fileInput" type="file" accept=".srt,text/plain">
          </label>
          <div class="input-wrap">
            <textarea id="srtInput" spellcheck="false" placeholder="Paste SRT content here..."></textarea>
          </div>
          <div class="cue-list" id="cueList" aria-live="polite"></div>
        </aside>

        <div class="splitter vertical split-left" data-splitter="left" role="separator" aria-label="Resize captions panel"></div>

        <section class="panel preview-panel">
          <div class="panel-head">
            <h2 class="panel-title">Video Preview</h2>
            <div class="preview-actions">
              <span class="pill" id="fpsMeta">30 fps</span>
            </div>
          </div>
          <div class="preview-body">
            <div class="stage-area" id="stageArea">
              <div class="video-stage" id="videoStage">
                <canvas id="previewCanvas" width="1280" height="720"></canvas>
                <canvas class="subtitle-layer" id="subtitleCanvas" width="1280" height="720"></canvas>
              </div>
            </div>
            <div class="preview-controls">
              <button class="btn primary icon-btn" id="playPreviewBtn" type="button" aria-label="Play preview" title="Play preview">
                <span class="play-icon" aria-hidden="true"></span>
                <span class="pause-icon" aria-hidden="true"></span>
              </button>
              <input class="range" id="previewScrubber" type="range" min="0" max="1" step="1" value="0" aria-label="Preview timeline">
            </div>
          </div>
        </section>

        <div class="splitter vertical split-right" data-splitter="right" role="separator" aria-label="Resize properties panel"></div>

        <aside class="panel properties-panel">
          <div class="panel-head">
            <h2 class="panel-title">Properties</h2>
          </div>
          <div class="properties-scroll">
            <div class="property-group">
              <h3 class="property-title">Project</h3>
              <label class="field settings-field">
                <span>Video Export</span>
                <select class="select" id="encoderSelect">
                  <option value="mp4-avc">MP4 H.264</option>
                </select>
              </label>
              <label class="field settings-field">
                <span>Cue Gap (ms)</span>
                <input id="cueDelayInput" type="number" min="0" max="60000" step="100" value="0">
              </label>
              <div class="action-grid" aria-label="Editor actions">
                <button class="btn primary" id="parseBtn" type="button">Parse</button>
                <button class="btn" id="sampleBtn" type="button">Load Sample</button>
                <button class="btn" id="copyJsonBtn" type="button" disabled>Copy JSON</button>
                <button class="btn" id="copySrtBtn" type="button" disabled>Copy SRT</button>
                <button class="btn" id="exportSubtitlePngBtn" type="button" disabled>Export PNG</button>
                <button class="btn" id="exportVideoBtn" type="button" disabled>Export Video</button>
              </div>
            </div>

            <div class="stats" aria-label="Parse statistics">
              <div class="stat">
                <span class="stat-value" id="cueCount">0</span>
                <span class="stat-label">Cues</span>
              </div>
              <div class="stat">
                <span class="stat-value" id="totalDuration">0s</span>
                <span class="stat-label">Length</span>
              </div>
              <div class="stat">
                <span class="stat-value" id="issueCount">0</span>
                <span class="stat-label">Issues</span>
              </div>
            </div>

            <div class="meta-row">
              <span class="meta-label">Active Caption</span>
              <span class="meta-value" id="activeCaptionMeta">None</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Preview Resolution</span>
              <span class="meta-value" id="resolutionMeta">1280 x 720</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Render Length</span>
              <span class="meta-value" id="renderLengthMeta">0s</span>
            </div>

            <div class="property-group">
              <h3 class="property-title">Caption Style</h3>
              <label class="field">
                <span>Font Size</span>
                <input id="captionSizeInput" type="number" min="18" max="96" step="1" value="34">
              </label>
              <label class="field">
                <span>Text Color</span>
                <input id="captionColorInput" type="color" value="#ffffff">
              </label>
              <label class="field">
                <span>Background</span>
                <select class="select" id="captionBgSelect">
                  <option value="none">Transparent</option>
                  <option value="soft">Soft Box</option>
                  <option value="solid">Solid Box</option>
                </select>
              </label>
            </div>

            <div class="messages" id="messages"></div>
          </div>
        </aside>

        <div class="splitter horizontal split-bottom" data-splitter="timeline" role="separator" aria-label="Resize timeline panel"></div>

        <section class="panel timeline-panel">
          <div class="panel-head">
            <h2 class="panel-title">Timeline</h2>
            <span class="time-label" id="timelineDuration">00:00:00,000</span>
          </div>
          <div class="timeline-body">
            <div class="timeline-ruler">
              <span>00:00:00,000</span>
              <span id="timelineEndLabel">00:00:00,000</span>
            </div>
            <div class="timeline-track" id="timelineTrack">
              <div class="timeline-playhead" id="timelinePlayhead"></div>
            </div>
          </div>
        </section>
      </section>
      <footer class="status-bar" aria-label="Application status">
        <span class="status-item">
          <span class="status-label">Time</span>
          <span class="time-label" id="previewTime">00:00:00,000</span>
        </span>
      </footer>
    </main>
    <div class="toast-region" id="toastRegion" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
