<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SRT Parser</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111214;
        --panel: #1a1c20;
        --panel-strong: #22252b;
        --line: #343842;
        --line-soft: #272a31;
        --text: #f3f5f8;
        --muted: #a5adba;
        --accent: #47c7a4;
        --accent-strong: #66e0bd;
        --danger: #ff7a7a;
        --warning: #f0c66b;
        --shadow: 0 18px 55px rgba(0, 0, 0, 0.42);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(71, 199, 164, 0.12), transparent 32rem),
          linear-gradient(135deg, #111214 0%, #15171b 48%, #0f1114 100%);
        color: var(--text);
        font: 14px/1.5 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      textarea,
      input {
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 7px;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .app {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      .topbar {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 48px);
        line-height: 1;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 10px 0 0;
        max-width: 620px;
        color: var(--muted);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .btn {
        min-height: 38px;
        padding: 0 14px;
        background: var(--panel-strong);
        color: var(--text);
        border: 1px solid var(--line);
      }

      .btn:hover {
        border-color: #4a505d;
        background: #292d35;
      }

      .btn.primary {
        background: var(--accent);
        color: #061511;
        border-color: var(--accent);
        font-weight: 700;
      }

      .btn.primary:hover {
        background: var(--accent-strong);
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(320px, 0.95fr) minmax(380px, 1.05fr);
        gap: 18px;
      }

      .panel {
        min-width: 0;
        background: rgba(26, 28, 32, 0.94);
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px;
        border-bottom: 1px solid var(--line-soft);
      }

      .panel-title {
        margin: 0;
        font-size: 15px;
        font-weight: 750;
      }

      .file-row {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
      }

      .file-row input {
        max-width: 220px;
        color: var(--muted);
      }

      .input-wrap {
        padding: 16px;
      }

      textarea {
        width: 100%;
        min-height: 520px;
        resize: vertical;
        display: block;
        padding: 14px;
        color: var(--text);
        background: #101216;
        border: 1px solid var(--line);
        border-radius: 8px;
        outline: none;
        tab-size: 2;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 13px;
      }

      textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(71, 199, 164, 0.14);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        padding: 16px;
        border-bottom: 1px solid var(--line-soft);
      }

      .stat {
        min-width: 0;
        padding: 12px;
        background: #121419;
        border: 1px solid var(--line-soft);
        border-radius: 8px;
      }

      .stat-value {
        display: block;
        font-size: 22px;
        line-height: 1.1;
        font-weight: 800;
      }

      .stat-label {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .messages {
        display: grid;
        gap: 8px;
        padding: 0 16px 14px;
      }

      .message {
        padding: 10px 12px;
        border-radius: 7px;
        background: #121419;
        border: 1px solid var(--line-soft);
        color: var(--muted);
      }

      .message.error {
        color: #ffd5d5;
        border-color: rgba(255, 122, 122, 0.38);
        background: rgba(255, 122, 122, 0.08);
      }

      .message.warning {
        color: #ffe5aa;
        border-color: rgba(240, 198, 107, 0.36);
        background: rgba(240, 198, 107, 0.08);
      }

      .cue-list {
        max-height: 536px;
        overflow: auto;
        padding: 16px;
      }

      .cue-list:empty::before {
        content: "Parsed subtitles will appear here.";
        display: block;
        padding: 28px;
        text-align: center;
        color: var(--muted);
        background: #121419;
        border: 1px dashed var(--line);
        border-radius: 8px;
      }

      .cue {
        display: grid;
        grid-template-columns: 54px minmax(0, 1fr);
        gap: 12px;
        padding: 14px 0;
        border-bottom: 1px solid var(--line-soft);
      }

      .cue:first-child {
        padding-top: 0;
      }

      .cue:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }

      .cue-index {
        width: 42px;
        height: 32px;
        display: grid;
        place-items: center;
        border-radius: 7px;
        background: rgba(71, 199, 164, 0.13);
        color: var(--accent-strong);
        font-weight: 800;
      }

      .cue-time {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        color: var(--muted);
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 12px;
      }

      .cue-text {
        margin-top: 7px;
        white-space: pre-wrap;
        color: var(--text);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 0 8px;
        border-radius: 999px;
        background: #111419;
        border: 1px solid var(--line);
      }

      .empty-text {
        color: var(--muted);
        font-style: italic;
      }

      @media (max-width: 860px) {
        .topbar {
          align-items: stretch;
          flex-direction: column;
        }

        .toolbar {
          justify-content: flex-start;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        textarea {
          min-height: 360px;
        }
      }

      @media (max-width: 540px) {
        .app {
          width: min(100vw - 20px, 1180px);
          padding: 18px 0;
        }

        .panel-head,
        .file-row {
          align-items: stretch;
          flex-direction: column;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .cue {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>SRT Parser</h1>
          <p class="subtitle">Paste or load an SRT file, then parse it into structured subtitles with timing, duration, validation messages, and clean export output.</p>
        </div>
        <div class="toolbar" aria-label="Subtitle actions">
          <button class="btn primary" id="parseBtn" type="button">Parse</button>
          <button class="btn" id="sampleBtn" type="button">Load Sample</button>
          <button class="btn" id="copyJsonBtn" type="button" disabled>Copy JSON</button>
          <button class="btn" id="copySrtBtn" type="button" disabled>Copy SRT</button>
        </div>
      </header>

      <section class="grid">
        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">Source</h2>
            <label class="file-row">
              <span>Open file</span>
              <input id="fileInput" type="file" accept=".srt,text/plain">
            </label>
          </div>
          <div class="input-wrap">
            <textarea id="srtInput" spellcheck="false" placeholder="Paste SRT content here..."></textarea>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">Parsed Subtitles</h2>
            <button class="btn" id="clearBtn" type="button">Clear</button>
          </div>
          <div class="stats" aria-label="Parse statistics">
            <div class="stat">
              <span class="stat-value" id="cueCount">0</span>
              <span class="stat-label">Cues</span>
            </div>
            <div class="stat">
              <span class="stat-value" id="totalDuration">0s</span>
              <span class="stat-label">Timeline</span>
            </div>
            <div class="stat">
              <span class="stat-value" id="issueCount">0</span>
              <span class="stat-label">Issues</span>
            </div>
          </div>
          <div class="messages" id="messages"></div>
          <div class="cue-list" id="cueList" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
